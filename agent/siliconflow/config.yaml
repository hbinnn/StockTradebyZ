# SiliconFlow Kimi-K2.6 图表复评配置
# 文档：https://docs.siliconflow.cn

# 路径参数（相对路径基于项目根目录）
candidates: "data/candidates/candidates_latest.json"
strategy_prompts:
  b1: "strategies/b1/prompt.md"
  brick: "strategies/brick/prompt.md"
  b2: "strategies/b2/prompt.md"
  b3: "strategies/b3/prompt.md"

kline_dir: "data/kline"
output_dir: "data/review"

# SiliconFlow 模型参数
model: "Pro/moonshotai/Kimi-K2.6"

# 请求间隔（秒），避免触发限流和超时
request_delay: 15

# 跳过已存在的评分文件（True=跳过，False=重新评分）
skip_existing: false

# 推荐门槛（总分 >= 此值才进入推荐列表）
suggest_min_score: 4.0
