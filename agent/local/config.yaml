# LM Studio 本地视觉大模型图表复评配置
# 文档：http://192.168.1.107:1234

# 路径参数（相对路径基于项目根目录）
candidates: "data/candidates/candidates_latest.json"
strategy_prompts:
  b1: "strategies/b1/prompt.md"
  brick: "strategies/brick/prompt.md"
  b2: "strategies/b2/prompt.md"

kline_dir: "data/kline"
output_dir: "data/review"

# LM Studio API 配置
api_url: "http://192.168.1.107:1234/v1/chat/completions"
model: "qwen/qwen3-vl-8b"

# 请求间隔（秒），本地模型处理大图片需要更长时间
request_delay: 15

# 跳过已存在的评分文件（True=跳过，False=重新评分）
skip_existing: false

# 推荐门槛（总分 >= 此值才进入推荐列表）
suggest_min_score: 4.0
