# 完美图形案例配置
# 每个策略可配置多个完美图形案例（代码+日期）
# 当候选股票与某完美图形相似度≥阈值时，会在K线图上标注

# 相似度阈值设置
similarity_threshold:
  high: 0.80    # ≥0.80 高度相似，显示 ★★★
  medium: 0.75  # ≥0.75 中度相似，显示 ★★
  low: 0.70     # ≥0.70 低度相似，显示 ★

# 特征提取窗口（最近N根K线）
feature_window: 30

