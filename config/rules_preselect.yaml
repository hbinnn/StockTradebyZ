# rules_preselect.yaml
# 量化初选规则配置文件
# pipeline/select_stock.py 读取本文件中的参数

# ── 全局设置 ─────────────────────────────────────────────────────────
global:
  data_dir: "./data/raw"          # A股日线CSV目录
  output_dir: "./data/candidates" # 候选结果输出目录
  top_m: 5000                     # 流动性池：取成交额最高的 top_m 只（测试用）
  n_turnover_days: 43             # 滚动成交额窗口（日）
  min_bars_buffer: 10             # 额外的最小 bar 缓冲

# ── B1 策略参数（KDJ + 知行均线多头排列） ────────────────────────────
b1:
  enabled: true
  zx_m1: 14
  zx_m2: 28
  zx_m3: 57
  zx_m4: 114
  j_threshold: 20.0
  j_q_threshold: 0.10

# ── 砖型图（BrickChart）策略参数 ──────────────────────────────────────
brick:
  enabled: true

  # 砖型图计算参数（通达信原版）
  n: 4
  m1: 4
  m2: 6
  m3: 6
  t: 4
  shift1: 90
  shift2: 100
  sma_w1: 1
  sma_w2: 1
  sma_w3: 1

  # 选股过滤阈值
  brick_growth_ratio: 0.5         # 今日红柱 >= N × 昨日绿柱绝对值

  # 知行线参数
  zxdq_ratio: null                 # 收盘价 < zxdq × ratio；null = 不启用
  zxdq_span: 10
  require_zxdq_gt_zxdkx: true
  require_close_gt_zxdq: true      # 收盘价 >= zxdq × zxdq_close_ratio
  zxdq_close_ratio: 0.98           # 容忍 2% 浮动
  zxdkx_m1: 14
  zxdkx_m2: 28
  zxdkx_m3: 57
  zxdkx_m4: 114

  # 周线均线多头排列
  require_weekly_ma_bull: true
  wma_short: 5
  wma_mid: 10
  wma_long: 20

# ── B2 策略参数（B1 衍生：昨日B1通过 + 今日涨幅放量突破） ──────────────
b2:
  enabled: true

  # B2 专属参数
  daily_gain_threshold: 0.0385   # 当日涨幅门槛（3.85%）
  j_max: 80.0                     # KDJ J 值上限

  # B1 参数（透传给内部 B1Selector）
  j_threshold: 20.0
  j_q_threshold: 0.10
  kdj_n: 9
  zx_m1: 14
  zx_m2: 28
  zx_m3: 57
  zx_m4: 114
  zxdq_span: 10
  require_close_gt_long: true
  require_short_gt_long: true
  wma_short: 5
  wma_mid: 10
  wma_long: 20
  max_vol_lookback: 20
